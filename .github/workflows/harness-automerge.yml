name: harness-automerge

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  automerge:
    if: contains(github.event.pull_request.labels.*.name, 'harness-update')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge harness PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          # Try admin merge (bypasses branch protection for harness bot merges)
          gh pr merge --squash --admin "$PR" --repo "${{ github.repository }}" \
            --subject "feat(harness): auto-merge harness update #$PR" || \
          # Fall back: close with comment if merge fails
          gh pr comment "$PR" --repo "${{ github.repository }}" \
            --body "⚠️ harness-automerge: could not merge automatically. Please merge manually."
