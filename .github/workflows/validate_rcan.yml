name: RCAN Spec Validation

on:
  push:
    paths:
      - '**.rcan.yaml'
      - '**.rcan.yml'
      - 'config/**'
  pull_request:
    paths:
      - '**.rcan.yaml'
      - '**.rcan.yml'
      - 'config/**'

jobs:
  validate-spec:
    runs-on: ubuntu-latest
    name: "Validate Robot Configs"

    steps:
      - name: Checkout Code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install jsonschema pyyaml

      - name: Validate Configs against RCAN Schema
        run: |
          python3 .github/scripts/validate_rcan.py \
            --schema config/rcan.schema.json \
            --dir config/presets
          python3 .github/scripts/validate_rcan.py \
            --schema config/rcan.schema.json \
            --dir tests/fixtures
