apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencastor.fullname" . }}
  labels:
    {{- include "opencastor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "opencastor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "opencastor.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "opencastor.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["castor", "gateway", "--config", "/etc/opencastor/robot.rcan.yaml"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: OPENCASTOR_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "opencastor.fullname" . }}-secrets
                  key: apiToken
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "opencastor.fullname" . }}-secrets
                  key: jwtSecret
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "opencastor.fullname" . }}-secrets
                  key: googleApiKey
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "opencastor.fullname" . }}-secrets
                  key: openaiApiKey
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "opencastor.fullname" . }}-secrets
                  key: anthropicApiKey
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: castor-data
              mountPath: {{ .Values.persistence.mountPath }}
            - name: config
              mountPath: /etc/opencastor
          {{- else }}
          volumeMounts:
            - name: config
              mountPath: /etc/opencastor
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "opencastor.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: castor-data
          persistentVolumeClaim:
            claimName: {{ include "opencastor.fullname" . }}-pvc
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
